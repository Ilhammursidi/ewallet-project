<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/login.css">
    <title>Login</title>
</head>
<body>
        <main>
        <section class="left">
            <section class="ewallet-logo">
                <img src="../assets/icon/upWallet.png" alt="wallet">
                <p class="text-logo">E-Wallet</p>
            </section>
            <section class="text-fill">
                <h1>Hello Welcome Back 👋</h1>
                <p>Fill out the form correctly or you can login with several option.</p>
            </section>
           <section class="sing-in-btn">
                <div class="social-media-button">
                    <img src="/assets/icon/google.svg" alt="google"><a href="">Sign in With Google</a>
                </div>
                <div class="social-media-button">
                    <img src="/assets/icon/round-fb.svg" alt="facebook"><a href="">Sign in With Facebook</a>
                </div >
                <section class="line"></section>
                <section class="or">Or</section>
            </section>
            <form class="login-form">
            <section class="email-form ">
                <label for="email">Email</label>
                <input type="email" name="email" id="" placeholder="Enter Your Email" required>
            </section>
            <section class="password-form password">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter Your Password" required>
                <span class="toggle-eye" onclick="showHide()"><img src="../assets/icon/fi_eye-off.svg" alt="" id="eye"></span>
            </section>
           
            <button type="submit">Login</button>
        </form>
            <section>
                <p class="register-question">Don't Have an Account? <a href="../pages/register.html">Register</a></p>
            </section>
        </section>

        <section class="right">
            <img src="../assets/images/handTouchPhone.png" alt="hand Touch phone">
        </section>
    </main>
    <script src="../script/login.js"></script>
</body>
</html>
