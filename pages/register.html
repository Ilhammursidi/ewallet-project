<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style/register.css">
    <title>Register</title>
</head>

<body>
    <main>
        <section class="left">
            <section class="ewallet-logo">
                <img src="../assets/icon/upWallet.png" alt="">
                <p class="text-logo">E-Wallet</p>
            </section>
            <section class="text-fill">
                <h1>Start Accessing Banking Needs
                    With All Devices and All Platforms
                    With 30.000+ Users</h1>
                <p>Transfering money is eassier than ever, you can access Zwallet wherever you are. Desktop, laptop,
                    mobile phone? we cover all of that for you!</p>
            </section>
            <section class="sing-in-btn">
                <button class="google-btn">Sign in With Google</button>
                <button class="facebook-btn">Sign in With Facebook</button>
                <section class="line"></section>
                <section class="or">Or</section>
            </section>
            <form class="register-form">
            <section class="email-form ">
                <label for="email">Email</label>
                <input type="email" name="email" id="" placeholder="Enter Your Email" required>
            </section>
            <section class="password-form password">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter Your Password" required>
                <span class="toggle-eye" onclick="showHide()"><img src="../assets/icon/fi_eye-off.svg" alt="" id="eye"></span>
            </section>
            <section class="password-form confirm-password">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" name="confirm-password" id="confirmPassword" placeholder="Enter Your Password Again" required>
                <span class="toggle-eye2" onclick="showHide2()"><img src="../assets/icon/fi_eye-off.svg" alt="" id="eye2"></span>
            </section>
            <button type="submit">Register</button>
        </form>
            <section>
                <p class="login-question">Have An Account? <a href="../pages/login.html">Login</a></p>
            </section>
        </section>






        <section class="right">
            <img src="../assets/images/handAndWallet.png" alt="">
        </section>
    </main>
    <script src="../script/register.js"></script>
</body>

</html>
