<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/forgotPassword.css">
    <title>Forgot Password</title>
</head>
<body>
    <main class="card">
        <section class="ewallet-logo">
            <img src="../assets/icon/upWallet.png" alt="wallet">
            <p class="text-logo">E-Wallet</p>
        </section>
        <section class="text-fill">
            <h1>Fill Out Form Correctly  👋</h1>
            <p>We will send new password to your email</p>
        </section>
        <section class="email-form">
            <label for="email">Email</label>
            <input type="email" name="email" id="" placeholder="Enter your email">
        </section>
        <section>
            <button type="submit">Submit</button>
        </section>
    </main>

</body>
</html>
